name: Build & Release LocalKey

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

# ─────────────────────────────────────────────────
# Determine version from tag or manual input
# ─────────────────────────────────────────────────
env:
  VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.version }}

jobs:
  # ══════════════════════════════════════════════
  # LINUX — produces LocalKey-v*-linux-x86_64.tar.gz
  # ══════════════════════════════════════════════
  build-linux:
    name: 🐧 Build Linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk libsecret-1-dev \
            libdbus-glib-1-dev pkg-config

      - name: Install Python deps
        working-directory: Application
        run: pip install -r requirements.txt pyinstaller pillow

      - name: PyInstaller build
        working-directory: Application
        run: pyinstaller localkey.spec --clean --noconfirm

      - name: Package tar.gz
        run: |
          VERSION="${{ env.VERSION }}"
          cd Application/dist
          tar -czf "../../LocalKey-${VERSION}-linux-x86_64.tar.gz" LocalKey

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: LocalKey-*-linux-x86_64.tar.gz

  # ══════════════════════════════════════════════
  # WINDOWS — produces LocalKey-Setup-v*-windows.msi
  # ══════════════════════════════════════════════
  build-windows:
    name: 🪟 Build Windows MSI
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      # ── Ensure WiX Toolset v3 is available ────────────────────────────────
      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          # Use already-installed version if present, otherwise install latest
          $wix = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wix) {
            Write-Host "✅ WiX already installed at $($wix.FullName)"
          } else {
            choco install wixtoolset -y --no-progress
          }

      # ── Convert plain-text LICENSE → LICENSE.rtf (WiX requires RTF) ────────
      - name: Convert LICENSE to RTF
        shell: pwsh
        run: |
          # Build a well-formed RTF document from the plain-text LICENSE.
          # Use single-quoted strings so \, { and } are all literal characters.
          $lines = Get-Content LICENSE
          $sb    = New-Object System.Text.StringBuilder
          [void]$sb.AppendLine('{\rtf1\ansi\deff0{\fonttbl{\f0\fnil\fcharset0 Courier New;}}\widowctrl\hyphauto')
          [void]$sb.AppendLine('\pard\f0\fs18')
          foreach ($line in $lines) {
            # RTF-escape the three special characters
            $esc = $line -replace '\\','\\\\' -replace '\{','\\{' -replace '\}','\\}'
            [void]$sb.AppendLine("$esc\par")
          }
          [void]$sb.Append('}')
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD 'LICENSE.rtf'),
            $sb.ToString(),
            [System.Text.Encoding]::ASCII
          )
          Write-Host "✅ LICENSE.rtf created ($($sb.Length) bytes)"

      # ── Compile + Link with WiX → .msi ────────────────────────────────────
      - name: Build MSI
        shell: pwsh
        env:
          LOCALKEY_VERSION: ${{ env.VERSION }}
        run: |
          $ver = $env:LOCALKEY_VERSION -replace '^v',''
          # WiX requires x.x.x.x (4-part) version — pad 3-part semver with .0
          $wixVer = if ($ver -match '^\d+\.\d+\.\d+$') { "$ver.0" } else { $ver }
          $env:LOCALKEY_VERSION = $wixVer
          Write-Host "Version (semver): $ver  |  Version (WiX): $wixVer"
          # Find WiX bin dynamically (handles any installed patch version)
          $wixDir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" | Select-Object -First 1
          $bin = Join-Path $wixDir.FullName "bin"
          Write-Host "Using WiX at: $bin"

          # Compile .wxs → .wixobj  (localkey.wxs + CustomUI.wxs)
          & "$bin\candle.exe" -nologo -arch x64 `
            -ext WixUIExtension -ext WixUtilExtension `
            installer\localkey.wxs installer\CustomUI.wxs `
            -out installer\
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Link .wixobj → .msi
          & "$bin\light.exe" -nologo `
            -ext WixUIExtension -ext WixUtilExtension `
            -cultures:en-us `
            installer\localkey.wixobj installer\CustomUI.wixobj `
            -out "LocalKey-Setup-v${ver}-windows.msi"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $out = "LocalKey-Setup-v${ver}-windows.msi"
          if (Test-Path $out) {
            Write-Host "✅ MSI created: $out"
          } else {
            Write-Error "❌ MSI not found"; exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: LocalKey-Setup-*.msi

  # ══════════════════════════════════════════════
  # MACOS — produces LocalKey-v*-macOS-arm64.dmg
  # ══════════════════════════════════════════════
  build-macos:
    name: 🍎 Build macOS DMG
    runs-on: macos-14   # Apple Silicon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python deps
        working-directory: Application
        run: pip install -r requirements.txt pyinstaller pillow

      - name: PyInstaller build
        working-directory: Application
        run: pyinstaller localkey.spec --clean --noconfirm

      - name: Create DMG
        run: |
          VERSION="${{ env.VERSION }}"
          ARCH="$(uname -m)"
          DMG="LocalKey-${VERSION}-macOS-${ARCH}.dmg"
          create-dmg \
            --volname "LocalKey" \
            --volicon "Application/icon256.png" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 100 \
            --icon "LocalKey.app" 175 180 \
            --hide-extension "LocalKey.app" \
            --app-drop-link 420 180 \
            "$DMG" \
            "Application/dist/LocalKey.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: LocalKey-*-macOS-*.dmg

  # ══════════════════════════════════════════════
  # RELEASE — attach all 3 to a GitHub Release
  # ══════════════════════════════════════════════
  release:
    name: 📦 Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      # When triggered manually, create & push the version tag so
      # softprops/action-gh-release can find it (it requires a tag).
      - name: Create git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ env.VERSION }}"
          git push origin "${{ env.VERSION }}" --force

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "LocalKey ${{ env.VERSION }}"
          body: |
            ## 🔐 LocalKey ${{ env.VERSION }}

            ### ⬇️ Direct Downloads

            | Platform | Download | Notes |
            |---|---|---|
            | 🐧 **Linux** (x86_64) | `LocalKey-${{ env.VERSION }}-linux-x86_64.tar.gz` | Extract & run `./LocalKey` |
            | 🪟 **Windows** (10/11) | `LocalKey-Setup-${{ env.VERSION }}-windows.msi` | Double-click → installs Python if needed, downloads & builds LocalKey automatically |
            | 🍎 **macOS** (12+) | `LocalKey-${{ env.VERSION }}-macOS-arm64.dmg` | Open DMG → drag to Applications |

            ### 🦊 Firefox Extension (Fully Tested ✅)
            Load `extension-firefox/` via `about:debugging` in Firefox.

            ### 🔗 After Installing
            Open LocalKey → click **Browser Integrations** → **Add +** to connect your browser.
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: release-assets/*
